<ion-content class="login-page" [fullscreen]="true">
  <section class="login-panel">
    <img
      class="login-logo"
      src="assets/LUMAC TRANSPORTES LOGO.jpeg"
      alt="Lumac Transportes e Logistica"
    />

    <div class="login-copy">
      <p>Area do motorista</p>
      <h1>Entrar na operacao</h1>
    </div>

    <form (ngSubmit)="login()">
      <ion-item>
        <ion-label position="stacked">Carta de condução, telefone ou email</ion-label>
        <ion-input
          name="identifier"
          type="text"
          autocomplete="username"
          placeholder="Ex.: MZ-DRV-0001"
          [(ngModel)]="identifier"
          required
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Senha</ion-label>
        <ion-input
          name="password"
          type="password"
          autocomplete="current-password"
          [(ngModel)]="password"
          required
        ></ion-input>
      </ion-item>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <ion-button type="submit" expand="block" [disabled]="isSubmitting">
        <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
        <span *ngIf="!isSubmitting">Entrar</span>
      </ion-button>
    </form>

    <p class="app-version">v{{ appVersion }}</p>
  </section>
</ion-content>
